version: "3.8"

networks:
  ecommerce_net:
    driver: bridge

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST
      - DB_PORT
      - DB_SERVICE
      - DB_USER
      - DB_PASSWORD
      - JWT_SECRET
      - ACCESS_TOKEN_EXPIRE_HOURS
    restart: unless-stopped
    depends_on:
      - frontend
    networks:
      - ecommerce_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/docs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - VITE_API_URL
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - ecommerce_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5173 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5